name: Deploy to PythonAnywhere via API

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # позволяет запускать вручную

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Trigger reload on PythonAnywhere
      run: |
        curl -X POST \
          -H "Authorization: Token ${{ secrets.PA_API_TOKEN }}" \
          -H "Content-Type: application/json" \
          -d '{"data": "reload"}' \
          https://www.pythonanywhere.com/api/v0/user/${{ secrets.PA_USERNAME }}/webapps/${{ secrets.PA_DOMAIN }}/reload/