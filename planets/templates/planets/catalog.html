{% extends 'base.html' %}
{% load static %}

{% block title %}Каталог | Solar World{% endblock %}

{% block css_additional %}
<link rel="stylesheet" href="{% static 'css/catalog.css' %}">
<link rel="stylesheet" href="{% static 'css/base.css' %}">
{% endblock %}

{% block content %}
<div class="catalog-container">
    <div class="text-block" style="text-align: center; margin-bottom: 2rem;">
        <h1>Каталог</h1>
        <p>Выберите категорию и начните исследование</p>
    </div>

    <!-- Панель фильтрации: поиск по названию + выбор категории -->
    <div class="filter-panel">
        <input type="text" id="search-input" placeholder="Поиск по названию...">
        <select id="category-select">
            <option value="all">Все категории</option>
            <option value="planet">Планеты</option>
            <option value="satellite">Спутники</option>
            <option value="mission">Миссии</option>
            <option value="agency">Агентства</option>
        </select>
    </div>

    <!-- Панель сортировки: разные наборы кнопок для разных категорий -->
    <div class="sort-panel">
        <span>Сортировать:</span>
        <div id="sort-buttons-planet-satellite" class="sort-buttons-group" style="display: none;">
            <button class="sort-btn" data-sort="name">Название <span class="sort-direction">↑</span></button>
            <button class="sort-btn" data-sort="radius">Радиус <span class="sort-direction">↑</span></button>
            <button class="sort-btn" data-sort="type">Тип</button>
        </div>
        <div id="sort-buttons-mission" class="sort-buttons-group" style="display: none;">
            <button class="sort-btn" data-sort="name">Название <span class="sort-direction">↑</span></button>
            <button class="sort-btn" data-sort="mission_type">Тип миссии</button>
            <button class="sort-btn" data-sort="agency">Агентство</button>
        </div>
        <div id="sort-buttons-agency" class="sort-buttons-group" style="display: none;">
            <button class="sort-btn" data-sort="name">Название <span class="sort-direction">↑</span></button>
        </div>
        <div id="sort-buttons-all" class="sort-buttons-group" style="display: none;">
            <button class="sort-btn" data-sort="name">Название <span class="sort-direction">↑</span></button>
        </div>
    </div>

    <!-- Результаты будут подгружены сюда -->
    <div id="results-container" class="results-grid"></div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const searchInput = document.getElementById('search-input');
        const categorySelect = document.getElementById('category-select');
        const resultsContainer = document.getElementById('results-container');

        const planetSatelliteGroup = document.getElementById('sort-buttons-planet-satellite');
        const missionGroup = document.getElementById('sort-buttons-mission');
        const agencyGroup = document.getElementById('sort-buttons-agency');
        const allGroup = document.getElementById('sort-buttons-all');

        let currentPage = 1;
        let totalPages = 1;
        let currentSort = 'name';
        let sortOrder = 'asc';

        // Формирует параметр ordering для API: "поле_направление"
        function getOrdering() {
            if (currentSort === 'name') {
                return sortOrder === 'asc' ? 'name_asc' : 'name_desc';
            } else if (currentSort === 'radius') {
                return sortOrder === 'asc' ? 'radius_asc' : 'radius_desc';
            } else if (currentSort === 'type') {
                return sortOrder === 'asc' ? 'type_asc' : 'type_desc';
            } else if (currentSort === 'mission_type') {
                return sortOrder === 'asc' ? 'mission_type_asc' : 'mission_type_desc';
            } else if (currentSort === 'agency') {
                return sortOrder === 'asc' ? 'agency_asc' : 'agency_desc';
            }
            return 'name_asc';
        }

        // Обновляет внешний вид кнопок сортировки: активная кнопка, стрелка направления
        function updateActiveButtons() {
            const visibleGroup = document.querySelector('.sort-buttons-group[style*="display: flex"]');
            if (!visibleGroup) return;
            const btns = visibleGroup.querySelectorAll('.sort-btn');
            btns.forEach(btn => {
                const sortField = btn.getAttribute('data-sort');
                if (sortField === currentSort) {
                    btn.classList.add('active');
                    if (sortField === 'name' || sortField === 'radius') {
                        const dirSpan = btn.querySelector('.sort-direction');
                        if (dirSpan) dirSpan.textContent = sortOrder === 'asc' ? '↑' : '↓';
                    }
                } else {
                    btn.classList.remove('active');
                    if (sortField === 'name') {
                        const dirSpan = btn.querySelector('.sort-direction');
                        if (dirSpan) dirSpan.textContent = '↑';
                    }
                }
            });
        }

        // Показывает кнопки сортировки, соответствующие выбранной категории
        function showSortGroup(category) {
            planetSatelliteGroup.style.display = 'none';
            missionGroup.style.display = 'none';
            agencyGroup.style.display = 'none';
            allGroup.style.display = 'none';

            if (category === 'planet' || category === 'satellite') {
                planetSatelliteGroup.style.display = 'flex';
            } else if (category === 'mission') {
                missionGroup.style.display = 'flex';
            } else if (category === 'agency') {
                agencyGroup.style.display = 'flex';
            } else {
                allGroup.style.display = 'flex';
            }
        }

        // При смене категории сортировка сбрасывается на "по имени" (чтобы не было несоответствий)
        function resetSortingForCategory() {
            currentSort = 'name';
            sortOrder = 'asc';
            updateActiveButtons();
        }

        // Клик по кнопке сортировки: меняет поле или направление
        document.querySelector('.sort-panel').addEventListener('click', (e) => {
            const btn = e.target.closest('.sort-btn');
            if (!btn) return;
            const sortField = btn.getAttribute('data-sort');
            if (sortField === currentSort) {
                sortOrder = sortOrder === 'asc' ? 'desc' : 'asc';
            } else {
                currentSort = sortField;
                sortOrder = 'asc';
            }
            updateActiveButtons();
            currentPage = 1;
            fetchCatalog();
        });

        // Запрос данных с API
        function fetchCatalog() {
            const q = searchInput.value.trim();
            const category = categorySelect.value;
            const ordering = getOrdering();
            const url = `/api/catalog/?q=${encodeURIComponent(q)}&category=${category}&page=${currentPage}&ordering=${ordering}`;

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    totalPages = data.total_pages;
                    renderResults(data.results);
                    renderPagination();
                })
                .catch(error => {
                    console.error('Ошибка загрузки:', error);
                    resultsContainer.innerHTML = '<div class="no-results">Не удалось загрузить данные</div>';
                });
        }

        // Отрисовка карточек
        function renderResults(items) {
            resultsContainer.innerHTML = '';
            if (items.length === 0) {
                resultsContainer.innerHTML = '<div class="no-results">Ничего не найдено</div>';
                return;
            }

            items.forEach(item => {
                let detailUrl = '';
                if (item.model_type === 'planet') detailUrl = `/planet/${item.id}/`;
                else if (item.model_type === 'satellite') detailUrl = `/satellite/${item.id}/`;
                else if (item.model_type === 'mission') detailUrl = `/mission/${item.id}/`;
                else if (item.model_type === 'spaceagency') detailUrl = `/spaceAgency/${item.id}/`;

                const imageUrl = item.image ? item.image : '/static/images/default.jpg';

                // Дополнительная информация зависит от типа объекта
                let extraInfo = '';
                if (item.model_type === 'planet') {
                    extraInfo = `<div class="card-meta">${item.type_display || '—'} • ${item.radius ? item.radius + ' км' : '—'}</div>`;
                } else if (item.model_type === 'satellite') {
                    extraInfo = `<div class="card-meta">${item.type_display || '—'} • ${item.radius ? item.radius + ' км' : '—'}</div>`;
                } else if (item.model_type === 'mission') {
                    const agencies = item.agency_names && item.agency_names.length
                        ? item.agency_names.join(', ')
                        : '—';
                    extraInfo = `<div class="card-meta">${item.type_display || '—'} • ${agencies}</div>`;
                } else if (item.model_type === 'spaceagency') {
                    extraInfo = `<div class="card-meta">${item.country || '—'}</div>`;
                }

                const link = document.createElement('a');
                link.href = detailUrl;
                link.className = 'catalog-card-link';

                const card = document.createElement('div');
                card.className = 'catalog-card';
                card.innerHTML = `
                    <div class="card-content">
                        <h3>${item.name}</h3>
                        <p>${item.first_line || item.model_type}</p>
                        ${extraInfo}
                    </div>
                    <div class="card-image">
                        <img src="${imageUrl}" alt="${item.name}">
                    </div>
                `;
                link.appendChild(card);
                resultsContainer.appendChild(link);
            });
        }

        // Пагинация (кнопки "Назад", "Вперёд", номера страниц)
        function renderPagination() {
            let paginationDiv = document.getElementById('pagination-controls');
            if (!paginationDiv) {
                paginationDiv = document.createElement('div');
                paginationDiv.id = 'pagination-controls';
                paginationDiv.className = 'pagination';
                document.querySelector('.catalog-container').appendChild(paginationDiv);
            }
            paginationDiv.innerHTML = '';

            if (currentPage > 1) {
                const prevBtn = document.createElement('button');
                prevBtn.textContent = '← Назад';
                prevBtn.addEventListener('click', () => {
                    currentPage--;
                    fetchCatalog();
                });
                paginationDiv.appendChild(prevBtn);
            }

            const startPage = Math.max(1, currentPage - 2);
            const endPage = Math.min(totalPages, currentPage + 2);
            for (let i = startPage; i <= endPage; i++) {
                const pageBtn = document.createElement('button');
                pageBtn.textContent = i;
                if (i === currentPage) {
                    pageBtn.disabled = true;
                    pageBtn.classList.add('active');
                }
                pageBtn.addEventListener('click', () => {
                    currentPage = i;
                    fetchCatalog();
                });
                paginationDiv.appendChild(pageBtn);
            }

            if (currentPage < totalPages) {
                const nextBtn = document.createElement('button');
                nextBtn.textContent = 'Вперёд →';
                nextBtn.addEventListener('click', () => {
                    currentPage++;
                    fetchCatalog();
                });
                paginationDiv.appendChild(nextBtn);
            }
        }

        // Обработчики событий
        categorySelect.addEventListener('change', () => {
            showSortGroup(categorySelect.value);
            resetSortingForCategory();
            currentPage = 1;
            fetchCatalog();
        });

        searchInput.addEventListener('input', () => {
            currentPage = 1;
            fetchCatalog();
        });

        // Инициализация
        showSortGroup(categorySelect.value);
        resetSortingForCategory();
        fetchCatalog();
    });
</script>
{% endblock %}
